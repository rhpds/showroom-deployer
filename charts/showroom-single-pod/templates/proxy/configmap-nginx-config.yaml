---
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-proxy-config
  namespace: {{ .Release.Namespace}}
apiVersion: v1
data:
  nginx.conf: |
    #daemon off;
    events {
    }
    error_log /dev/stdout info;
    http {
      include /etc/nginx/mime.types;
      proxy_cache off;
      expires -1;
      proxy_cache_path /dev/null keys_zone=mycache:10m;

      map $http_upgrade $connection_upgrade {
          default upgrade;
          '' close;
      }

      server {
        listen 8080;

        absolute_redirect off;

        location / {
          proxy_pass http://127.0.0.1:8000;

          expires off;
          proxy_cache off;
          proxy_pass_request_headers on;
          proxy_set_header Accept-Encoding "gzip";
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

{{-   if eq .Values.terminal.setup "true" }}
        # Terminal locations - supports /terminal, /terminal1, /terminal2, /tty, /tty1, /tty2, etc.
        location ~ ^/(terminal[0-9]*|tty[0-9]*)/ {
          proxy_pass http://127.0.0.1:{{ .Values.terminal.port }};
          rewrite ^/(terminal[0-9]*|tty[0-9]*)/(.*)$ /$2 break;

          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;

          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
{{- end }}

{{-   if eq .Values.wetty.setup "true" }}
        location ^~ /wetty {
          proxy_pass http://127.0.0.1:{{ .Values.wetty.port }}/{{ .Values.wetty.base }};
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;

          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $http_host;
          proxy_set_header X-NginX-Proxy true;
        }
{{- end }}

{{-   if eq .Values.nookbag_sidecar.setup "true" }}
        location = /healthz {
          proxy_pass http://127.0.0.1:8090/healthz;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /readyz {
          proxy_pass http://127.0.0.1:8090/readyz;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
{{- end }}

{{-   if eq .Values.runtime_automation.setup "true" }}
        location /stream/ {
          rewrite ^/stream(/.*)$ $1 break;
          proxy_pass http://127.0.0.1:{{ .Values.runtime_automation.port }}/;
          proxy_http_version 1.1;
          proxy_buffering off;
          proxy_cache off;
          proxy_read_timeout 3600s;
          proxy_connect_timeout 3600s;
          chunked_transfer_encoding off;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }
{{- end }}

{{-   if eq .Values.novnc.setup "true" }}
        location ^~ /novnc {
          proxy_pass http://127.0.0.1:{{ .Values.novnc.port }};

          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $host;
          proxy_set_header X-NginX-Proxy true;
        }

        location ^~ /websockify {
          proxy_pass http://127.0.0.1:{{ .Values.novnc.port }}/websockify;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 43200000;

          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Host $host;
          proxy_set_header X-NginX-Proxy true;
        }
{{- end }}
      }
    }
