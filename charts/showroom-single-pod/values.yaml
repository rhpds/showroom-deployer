---
# Default values for showroom.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

guid: nnnnn
user: ""

deployer:
  domain: cluster-GUID.GUID.sandboxNUMBERS.opentlc.com

proxy:
  image: quay.io/rhpds/nginx:1.25
  imagePullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 5m
      memory: 16Mi

content:
  image: quay.io/rhpds/showroom-content:v1.4.2
  imagePullPolicy: IfNotPresent
  repoUrl: https://github.com/rhpds/showroom_template_nookbag.git
  repoRef: main
  antoraPlaybook: site.yml
  antoraUiBundleUrl: ""
  antoraNavbarLogo: ""
  enableDevMode: "false"
  uiConfig: ""
  zero_touch_bundle: "https://github.com/rhpds/nookbag/releases/download/nookbag-v0.3.6/nookbag-v0.3.6.zip"
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  user_data: |
    bastion_password: from_helm

nookbag_sidecar:
  setup: "true"
  image: quay.io/rhpds/nookbag-sidecar:v1.0.2
  imagePullPolicy: IfNotPresent
  baseUrl: "http://localhost:8080"
  nookbagBase: ""
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 16Mi

runtime_automation:
  setup: "false"
  image: quay.io/rhpds/zt-runner:v2.5.0
  imagePullPolicy: Always
  port: 8501
  environment_variables: {}
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

terminal:
  setup: "true"
  image: quay.io/rhpds/openshift-showroom-terminal-ocp:latest
  imagePullPolicy: IfNotPresent
  port: 7681
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  # Set up persistent storage for the lab-user's home directory
  storage:
    setup: "true"
    pvcSize: 5Gi
    # Use default Storage Class when empty
    storageClass: ""

wetty:
  setup: "true"
  image: quay.io/rhpds/wetty:v2.7.6
  imagePullPolicy: IfNotPresent
  port: 8001
  base: "wetty"
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 500m
      memory: 256Mi

git_cloner:
  image: quay.io/rhpds/git-cloner:v1.1.5

antora:
  image: quay.io/rhpds/antora:v1.2.4

novnc:
  setup: "false"
  image: ghcr.io/rhpds/showroom-novnc:latest
  imagePullPolicy: IfNotPresent
  port: 6080
  vncServer: 127.0.0.1:5900
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 500m
      memory: 256Mi
