---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zerotouch.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerotouch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
    name: showroom
  selector:
    {{- include "zerotouch.selectorLabels" . | nindent 4 }}
