{{- if eq .Values.ironrdp.setup "true" }}
---
apiVersion: v1
kind: Service
metadata:
  name: windows-jetrdp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerotouch.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: 7171
    protocol: TCP
    targetPort: 7171
  selector:
    {{- include "zerotouch.selectorLabels" . | nindent 4 }}
{{- end }}
