---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edit-{{ include "zerotouch.fullname" . }}-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zerotouch.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- kind: ServiceAccount
  name: {{ include "zerotouch.fullname" . }}
  namespace: {{ .Release.Namespace }}
